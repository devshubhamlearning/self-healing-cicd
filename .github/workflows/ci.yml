name: Self-Healing CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  actions: write
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build Docker image
      run: docker build -t self-healing-app:latest -f app/Dockerfile .

    - name: Run tests in Docker
      id: run_tests
      run: |
        docker run --rm \
          -v $GITHUB_WORKSPACE/tests:/app/tests \
          -e PYTHONPATH=/app \
          self-healing-app:latest \
          sh -c "pip install pytest httpx -q && pytest tests/ -v --tb=short 2>&1" \
          > test_logs.txt 2>&1 || echo "TESTS_FAILED=true" >> $GITHUB_ENV
        cat test_logs.txt

    - name: Upload failure logs
      if: env.TESTS_FAILED == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: test-failure-logs
        path: test_logs.txt

    - name: Trigger self-heal if failed
      if: env.TESTS_FAILED == 'true'
      uses: actions/github-script@v6
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          await github.rest.actions.createWorkflowDispatch({
            owner: context.repo.owner,
            repo: context.repo.repo,
            workflow_id: 'self-heal.yml',
            ref: 'main',
            inputs: {
              run_id: context.runId.toString()
            }
          })
          console.log('Self-heal workflow triggered!')

    - name: Pass if tests succeeded
      if: env.TESTS_FAILED != 'true'
      run: echo "✅ All tests passed!"
